<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <link rel="shortcut icon" href="assets/images/chicken-biryani-5.jpg" type="image/x-icon">
        <title>Biryani Eater</title>
    </head>
    <body>
        <div class="title">
            <p>Biryani Eater</p>
        </div>
        <div class="picture-holder">
            <img src="assets/images/delicious-chicken-biryani-plate-on-transparent-background-free-png.webp" alt="Spinning plate of Biryani" class="spin">
        </div>
        <div class="holder">
            <div class="desc">
                <p id="text">You Ate 0 Plates of Biryani</p>
                <button id="btn">Eat Biryani</button>
            </div>
        </div>
    </body>
    <script src="script.js"></script>
</html>
